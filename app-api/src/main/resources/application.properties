# Application identity
spring.application.name=app-api

# Backend API port. Defaults to 8080 for local development.
server.port=${SERVER_PORT:8080}

# Allowed frontend origin for browser API requests.
# Defaults to the local Vite development server.
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}

# PostgreSQL database connection.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/travlr}
spring.datasource.username=${DB_USERNAME:travlr_app}
spring.datasource.password=${DB_PASSWORD:travlr_app}

# JPA / Hibernate.
# Flyway owns schema creation; Hibernate validates that mappings match the database.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway database migrations.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
